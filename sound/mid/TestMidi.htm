      let k=a[i];

      let touch2={};//values for 2 touch pinch
      
      svg.div.addEventListener('touchstart',function(e) {

        let et=e.touches,t0=et[0],
            c=svg.div;
        if (et.length==2) {
          let t1=et[1];
          touch2.x=(t0.pageX+t1.pageX)/2;
          touch2.y=(t0.pageY+t1.pageY)/2;
          let dx=t1.pageX-t0.pageX,dy=t1.pageY-t0.pageY;
          touch2.dist=Math.sqrt(dx*dx+dy*dy);
          touch2.scale0=svg.scale||1;
          touch2.scrollLeft=c.scrollLeft;
          touch2.scrollTop=c.scrollTop;
          //console.log(t0);

        } else {

      function renderSVG(na,t1,n0,n1) {
        //---
        if ((svg.naLen===undefined)||(na.length!=svg.naLen)) {
        
        let s=
        '<svg width='+sw+' height='+sh+'>'+
        '<rect width="100%" height="100%" fill="#ccc" stroke="black" stroke-width=1 />'+
        '<rect width="100" height="200" fill="#888" />';

        //onsole.log(n0+' '+n1);
        
        for (let n=n0;n<=n1;n++) {

        }
        
        for (let o of na) {
          let x=0.5+w*o.t/t1,y=0.5+h*(o.n-n0)/(n1-n0+1),wh=Math.max(0.5,w*o.dt/t1-1),hh=h/(n1-n0+1)-1;

        }
        
        let sel=svg.sel;
        s+='<rect x='+sel.x+' y='+sel.y+' width='+sel.w+' height='+sel.h+' fill="rgba(200,200,100,0.5)" stroke="black" stroke-width=0.5 />';
        
        //s+='<rect x=10 y=5 width=20 height=10 fill="#4c4" stroke="black" stroke-width=0.2 />';
        //s+='<rect x=10 y=20 width=20 height=10 fill="#4c4" stroke="black" stroke-width=0.2 />';
        s+='</svg>';
        
        svg.naLen=na.length;
        svg.div.innerHTML=s;
        
        svg.div.firstChild.style='transform-origin: top left;transform: scale(1);';
        
        }
        
        
        let c=svg.div.firstChild;
        c=c.childNodes[1];
        c.setAttribute('width',cursor.pos/dpr);
        //onsole.log(c);
        //...
      }
      
      function render() {
        //---
        //onsole.log('render');
        
        
        //try {
        //let a=JSON.parse('['+ta.value+']')
        let d=data,//JSON.parse(ta.value),
            a=d.notes;
        if (a.length==0) return;
        let t=-a[0][0];
        //data=d;
        let openNotes={},n0=1000,n1=-1000,t1=0,ni=-1;
        na.length=0;
        for (let b of a) {
          ni++;
          t+=b[0];
          if (b[1]==CONTROL) continue;//pedal
          let n=b[2];
          if ((b[3]==0)||(b[1]==128)) {
            let h=openNotes[n];
            if (!h) continue;
            delete(openNotes[n]);//b[2]//=undefined;
            let dt=t-h.t;  
            na.push({n:n,t:h.t,dt:dt,openi:h.openi,closei:ni});    
            n0=Math.min(n,n0);
            n1=Math.max(n,n1);
            t1=t;
            continue;//note off
          }
          openNotes[n]={t:t,v:b[3],openi:ni};  
        }
        
        for (let n of Object.keys(openNotes)) {
          //console.log('still open:'+n);
          let h=openNotes[n];
          let dt=t-h.t+10;//t-h.t;  
          //if (dt<10) dt=10;
          na.push({n:n,t:h.t,dt:dt});    
          n0=Math.min(n,n0);
          n1=Math.max(n,n1);
          t1=t+10;
        }
        
        //onsole.log(w+' '+h);
        
        if (c) {
        let ct=c.getContext('2d'),w=c.width,h=c.height;
        ct.strokeStyle='#000';
        ct.clearRect(0,0,w,h);
        
        ct.fillStyle='#888';
        ct.fillRect(0,0,cursor.pos,h);
        
        ct.strokeRect(0,0,w,h);

          ct.fillRect(x,y,wh,hh);
          ct.strokeRect(x,y,wh,hh);
        }
        }
        
        renderSVG(na,t1,n0,n1);
        
        
        //ct.strokeRect(0,0,w,h);
        //onsole.log('canvas render');
        //} catch (e) {}
        //...
      }

      this.cursor=cursor;

      render();
      //...
